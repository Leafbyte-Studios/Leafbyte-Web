<!DOCTYPE html>
<html>
    <head>
        <title>Leafbyte Web</title>
        <link rel="icon" type="image" href="./../assets/favicon.ico">
        <link rel="stylesheet" href="./../styles/contact.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <header>
        <div class="header-top" style="text-align: center;">
            <img class="header-logo" src="./../assets/logo.png" alt="Leafbyte Studios Logo">
        </div>
        <div class="button-grid">
            <button onclick="window.location.href='./../index.html';">Home</button>
            <button onclick="window.location.href='./projects.html';">Projects</button>
            <button onclick="window.location.href='./contact.html';">Contact</button>
            <button onclick="window.location.href='./join.html';">Join</button>
        </div>
    </header>
    <body>
        <div class="center-div">
            <div class="container">
                <form action="https://formspree.io/f/mnjolbrk" method="POST">

                    <input type="hidden" name="_next" value="https://leafbyte-studios.github.io/Leafbyte-Web/thank_you.html">
                
                    <h2>Contact Us</h2>
                
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                
                    <button class="button-form" type="submit">Send</button>
                
                </form>
            </div>
        </div>
    </body>
</html>

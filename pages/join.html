<!DOCTYPE html>
<html>
    <head>
        <title>Leafbyte Web</title>
        <link rel="icon" type="image" href="./../assets/favicon.ico">
        <link rel="stylesheet" href="./../styles/join.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <header>
        <div class="header-top" style="text-align: center;">
            <img class="header-logo" src="./../assets/logo.png" alt="Leafbyte Studios Logo">
        </div>
        <div class="button-grid">
            <button onclick="window.location.href='./../index.html';">Home</button>
            <button onclick="window.location.href='./projects.html';">Projects</button>
            <button onclick="window.location.href='./contact.html';">Contact</button>
            <button onclick="window.location.href='./join.html';">Join</button>
        </div>
    </header>
    <body>
        <div class="center-div">
            <div class="container">
                <form name="join" method="POST" data-netlify="true">
                    <input type="hidden" name="form-name" value="join">

                    <h2>Join the Studio</h2>

                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="Discord Username (Primary)">Discord:</label>
                    <input type="discord" id="discord" name="discord">

                    <label for="portfolio">Portfolio (Perferably: Google Drive Link):</label>
                     <input id="portfolio" name="portfolio" required>

                    <button class="button-form" type="submit">Send</button>
                </form>
            </div>
        </div>
    </body>
</html>
